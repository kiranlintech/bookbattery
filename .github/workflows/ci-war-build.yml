name: Java WAR CI Pipeline

on:
  push:
    branches:
      - git-actions
  workflow_dispatch:

jobs:
  build-war:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Verify tools
        run: |
          java -version
          mvn -version

      - name: Install COS legacy JAR
        run: |
          mvn install:install-file \
            -Dfile=lib/cos-05Nov2002.jar \
            -DgroupId=com.oreilly.servlet \
            -DartifactId=cos \
            -Dversion=05Nov2002 \
            -Dpackaging=jar

      - name: Build WAR
        run: mvn clean package -DskipTests

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookbattery-war
          path: target/*.war
